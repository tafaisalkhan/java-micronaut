micronaut.application.name=demo

# H2 Datasource
datasources.default.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
datasources.default.driver-class-name=org.h2.Driver
datasources.default.username=sa
datasources.default.password=
datasources.default.schema-generate=CREATE_DROP
datasources.default.dialect=H2

# Security - JWT
micronaut.security.enabled=true
micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.secret.generator.secret=this-is-a-secret-key-change-in-production-please
micronaut.security.token.jwt.generator.access-token.expiration=3600

# URL-based security rules
micronaut.security.intercept-url-map[0].pattern=/auth/**
micronaut.security.intercept-url-map[0].access=isAnonymous()
micronaut.security.intercept-url-map[1].pattern=/**
micronaut.security.intercept-url-map[1].access=isAuthenticated()
